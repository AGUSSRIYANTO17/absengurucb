    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const phi1 = lat1 * Math.PI / 180;
      const phi2 = lat2 * Math.PI / 180;
      const deltaPhi = (lat2 - lat1) * Math.PI / 180;
      const deltaLambda = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                Math.cos(phi1) * Math.cos(phi2) *
                Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c; 
    }

    function App() {

      const [role, setRole] = useState(null); 
      const [activeGuru, setActiveGuru] = useState(null); 
      const [user, setUser] = useState(null);

      const [attendanceList, setAttendanceList] = useState([]);

      const [currentTime, setCurrentTime] = useState(new Date());

      };

      };

      };

        if (isLocal) return;
        if (!user) return;

          if (docSnap.exists()) {
            const cloudData = docSnap.data();
            if (cloudData.schoolCoords) setSchoolCoords(cloudData.schoolCoords);
            if (cloudData.allowedRadius) setAllowedRadius(cloudData.allowedRadius);

        });

        return () => unsubSettings();

      }, [sheetApiUrl]);

      const saveToSheet = async (data) => {
        if (!sheetApiUrl || sheetApiUrl.trim() === "" || sheetApiUrl.includes("XXXXXXXXXXXXXX")) {
          return false;
        }
        try {
          await fetch(sheetApiUrl, {
            method: "POST",
            mode: "no-cors",
            redirect: "follow",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(data)
          });
          return true;
        } catch (e) {
          console.error("Kesalahan pengiriman Google Sheet:", e);
          return false;
        }
      };

      const testSheetConnection = async () => {
        if (!tempSheetApiUrl || tempSheetApiUrl.trim() === "") {
          setTestResult({ status: "error", message: "Masukkan link URL Google Sheets API terlebih dahulu." });
          return;
        }
        if (!tempSheetApiUrl.startsWith("https://script.google.com/macros/s/")) {
          setTestResult({ 
            status: "error", 
            message: "Format URL salah! Anda memasukkan link Spreadsheet pengeditan. Harap pastekan URL Web App hasil 'Deploy' di Apps Script Anda (yang diawali dengan 'https://script.google.com/macros/s/...')." 
          });
          return;
        }
        setTestingConnection(true);
        setTestResult(null);
        try {
          await fetch(tempSheetApiUrl, {
            method: "POST",
            mode: "no-cors",
            redirect: "follow",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "ping" })

            status: "success",

            status: "error", 
            message: "Gagal menghubungkan ke Apps Script. Error: " + err.toString() + ". Pastikan deployment di Apps Script sudah diubah aksesnya ke 'Anyone'."

        } finally {
          setTestingConnection(false);
        }

      const clearAllLocalLogs = () => {

      };

      const handleAdminLogout = () => {
        setRole(null);
        setAdminTab('dashboard');
        triggerToast("Anda telah keluar dari panel Admin.");

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);

        const initAuthAndConfig = async () => {
          if (isLocal) {
            setUser({ uid: 'local-admin-account' });
            return;
          }
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            setIsLocal(true);
            setUser({ uid: 'local-admin-account' });
          }
        };

        initAuthAndConfig();

        let unsubscribeAuth = () => {};
        if (!isLocal && auth) {
          unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) setUser(currentUser);
          });
        }

        updateLocationDetails(gpsCoords.latitude, gpsCoords.longitude);

        return () => {
          clearInterval(timer);
          stopCamera();
          unsubscribeAuth();
        };
      }, [isLocal]);

      useEffect(() => {
        if (isLocal) {
          const cachedGuru = localStorage.getItem('absen_guru_list');
          if (cachedGuru) setGuruList(JSON.parse(cachedGuru));
          else { setGuruList(DEFAULT_GURU); localStorage.setItem('absen_guru_list', JSON.stringify(DEFAULT_GURU)); }

          const cachedAbsen = localStorage.getItem('absen_logs_data');
          if (cachedAbsen) setAttendanceList(JSON.parse(cachedAbsen));
          else { setAttendanceList(DEFAULT_ABSEN); localStorage.setItem('absen_logs_data', JSON.stringify(DEFAULT_ABSEN)); }

          const cachedJurnal = localStorage.getItem('absen_jurnal_data');
          if (cachedJurnal) setJurnalList(JSON.parse(cachedJurnal));
          else { setJurnalList(DEFAULT_JURNAL); localStorage.setItem('absen_jurnal_data', JSON.stringify(DEFAULT_JURNAL)); }
          return;
        }

        if (!user) return; 

        const collectionGuru = collection(db, 'artifacts', appId, 'public', 'data', 'guru');
        const collectionAbsensi = collection(db, 'artifacts', appId, 'public', 'data', 'absensi');
        const collectionJurnal = collection(db, 'artifacts', appId, 'public', 'data', 'jurnal');

        const unsubGuru = onSnapshot(collectionGuru, (snapshot) => {
          if (snapshot.empty) DEFAULT_GURU.forEach(g => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'guru', g.id), g));
          else setGuruList(snapshot.docs.map(d => d.data()));
        }, (err) => console.error("Error fetching guru:", err));

        const unsubAbsensi = onSnapshot(collectionAbsensi, (snapshot) => {
          if (snapshot.empty) DEFAULT_ABSEN.forEach(a => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'absensi', a.id), a));
          else setAttendanceList(snapshot.docs.map(d => d.data()).sort((a, b) => b.tanggal.localeCompare(a.tanggal) || b.waktu.localeCompare(a.waktu)));
        }, (err) => console.error("Error fetching absensi:", err));

        const unsubJurnal = onSnapshot(collectionJurnal, (snapshot) => {
          if (snapshot.empty) DEFAULT_JURNAL.forEach(j => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jurnal', j.id), j));
          else setJurnalList(snapshot.docs.map(d => d.data()).sort((a, b) => b.tanggal.localeCompare(a.tanggal)));
        }, (err) => console.error("Error fetching jurnal:", err));

        return () => { unsubGuru(); unsubAbsensi(); unsubJurnal(); };
      }, [user, isLocal]);

      const updateLocationDetails = (lat, lon) => {
        const dist = calculateDistance(lat, lon, schoolCoords.latitude, schoolCoords.longitude);
        setDistanceToSchool(dist);
        setIsInsideSchool(dist <= allowedRadius);
      };

      const handleGpsSourceChange = (useRealGps) => {
        setIsSimulationMode(!useRealGps);
        if (useRealGps) {
          requestRealGpsLocation();
        } else {
          setGpsCoords({ latitude: schoolCoords.latitude, longitude: schoolCoords.longitude });
          updateLocationDetails(schoolCoords.latitude, schoolCoords.longitude);
          triggerToast("Mode Simulasi Lokasi Aktif.");
        }
      };

      const requestRealGpsLocation = () => {
        if (!navigator.geolocation) {
          setGpsError("Browser Anda tidak mendukung GPS Lokasi.");
          return;
        }
        setLoadingGps(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            setGpsCoords({ latitude, longitude });
            updateLocationDetails(latitude, longitude);
            setLoadingGps(false);
            setGpsError(null);
            triggerToast("Lokasi GPS asli berhasil diperbarui.");
          },
          (err) => {
            setLoadingGps(false);
            let errMsg = "Akses lokasi ditolak. Aktifkan GPS dan izinkan izin browser.";
            if (err.code === 1) errMsg = "Izin lokasi ditolak oleh pengguna/browser.";
            else if (err.code === 2) errMsg = "Posisi GPS tidak ditemukan (sinyal lemah).";
            else if (err.code === 3) errMsg = "Waktu tunggu pencarian GPS habis.";
            setGpsError(errMsg);
            triggerToast("Gagal membaca GPS asli. Pastikan izin lokasi aktif.");
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      };

      const handleSimulationSlider = (distanceRatio) => {
        const offset = (distanceRatio / 100) * 0.003; 
        const simulatedLat = schoolCoords.latitude + offset;
        const simulatedLon = schoolCoords.longitude + offset;
        setGpsCoords({ latitude: simulatedLat, longitude: simulatedLon });
        updateLocationDetails(simulatedLat, simulatedLon);
      };

      const startCamera = async () => {
        setIsCameraActive(true);
        setCapturedPhoto(null);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          setCameraStream(stream);
          if (videoRef.current) videoRef.current.srcObject = stream;

        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max_width = 240; 
          const max_height = 180;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_width) {
              height *= max_width / width;
              width = max_width;
            }
          } else {
            if (height > max_height) {
              width *= max_height / height;
              height = max_height;
            }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.35));
        };
        img.src = dataUrl;
      };

        ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
        
        const rawDataUrl = canvas.toDataURL('image/jpeg', 0.5);
        resizeAndCompressImage(rawDataUrl, (compressedDataUrl) => {
          setCapturedPhoto(compressedDataUrl);

                          <input type="text" required placeholder="Suprianto, S.Pd." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400" value={newGuru.nama} onChange={(e) => setNewGuru({...newGuru, nama: e.target.value})} />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">NIP Pegawai</label>
                          <input type="text" required placeholder="19800512..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none font-mono focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400" value={newGuru.nip} onChange={(e) => setNewGuru({...newGuru, nip: e.target.value})} />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">Mata Pelajaran</label>
                          <input type="text" required placeholder="Matematika Peminatan" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400" value={newGuru.mapel} onChange={(e) => setNewGuru({...newGuru, mapel: e.target.value})} />
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white font-black py-3 rounded-xl text-xs transition-all shadow-md">
                          Daftarkan Pendidik
                        </button>
                      </form>
                    </div>

                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm md:col-span-7 flex flex-col h-[420px]">
                      <h3 className="font-extrabold text-xs text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-100 pb-2">Daftar Pendidik ({guruList.length})</h3>
                      <div className="flex-1 overflow-y-auto divide-y divide-slate-100 pr-1">
                        {guruList.map(g => (
                          <div key={g.id} className="py-3 flex items-center justify-between group">
                            <div>
                              <h4 className="text-xs font-bold text-slate-800">{g.nama}</h4>
                              <p className="text-[10px] text-slate-500 mt-0.5">NIP. {g.nip} • {g.mapel}</p>
                            </div>
                            <button onClick={() => handleDeleteGuru(g.id, g.nama)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all">
                              <TrashIcon />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {adminTab === 'pengaturan' && (
                  <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm max-w-lg mx-auto space-y-6">
                    <div>
                      <h3 className="font-extrabold text-xs text-slate-500 uppercase tracking-widest mb-1">Pengaturan & Integrasi</h3>
                      <p className="text-[10px] text-slate-400">Konfigurasi geofencing dan database penyimpanan Google Sheets.</p>
                    </div>

                    <form onSubmit={handleUpdateSchoolSettings} className="space-y-4">
                      <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">Instansi</label>
                        <input type="text" className="w-full bg-slate-100 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-500 outline-none" value={SCHOOL_CONFIG.name} disabled />
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">Latitude</label>
                          <input type="number" step="any" required className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none font-mono focus:ring-2 focus:ring-amber-500/20" value={tempSchoolCoords.latitude} onChange={(e) => setTempSchoolCoords({...tempSchoolCoords, latitude: parseFloat(e.target.value)})} />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">Longitude</label>
                          <input type="number" step="any" required className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none font-mono focus:ring-2 focus:ring-amber-500/20" value={tempSchoolCoords.longitude} onChange={(e) => setTempSchoolCoords({...tempSchoolCoords, longitude: parseFloat(e.target.value)})} />
                        </div>
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1 uppercase">Radius Toleransi (Meter)</label>
                        <input type="number" required className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none font-mono focus:ring-2 focus:ring-amber-500/20" value={tempRadius} onChange={(e) => setTempRadius(e.target.value)} />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-emerald-600 block mb-1 uppercase font-mono">Web App URL Google Sheets API</label>
                        <input type="text" required className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-xs text-slate-800 outline-none font-mono focus:ring-2 focus:ring-emerald-500/20" value={tempSheetApiUrl} onChange={(e) => setTempSheetApiUrl(e.target.value)} />
                        <p className="text-[9px] text-slate-400 mt-1">Sematkan URL Web App Google Apps Script Anda yang baru di atas.</p>
                      </div>

                      <div className="pt-4 border-t border-slate-100 space-y-3">
                        <button 
                          type="button" 
                          onClick={testSheetConnection}
                          disabled={testingConnection}
                          className="w-full py-2.5 border border-slate-200 hover:border-sky-500 hover:bg-sky-50 text-slate-700 hover:text-sky-700 font-bold rounded-xl text-xs transition-all flex items-center justify-center gap-2"
                        >
                          {testingConnection ? (
                            <span className="w-4 h-4 rounded-full border-2 border-slate-400 border-t-transparent animate-spin"></span>
                          ) : "💡 Uji Koneksi Database"}
                        </button>

                        {testResult && (
                          <div className={`p-4 rounded-2xl border text-xs leading-relaxed ${
                            testResult.status === 'success' 
                              ? 'bg-emerald-50 border-emerald-100 text-emerald-800 font-semibold' 
                              : 'bg-rose-50 border-rose-100 text-rose-800 font-semibold'
                          }`}>
                            {testResult.message}
                          </div>
                        )}
                      </div>

                      <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl space-y-3">
                        <h4 className="text-[11px] font-extrabold text-amber-800 flex items-center gap-1.5 uppercase tracking-wide">
                          ⚠️ SOLUSI ERROR IZIN GOOGLE DRIVE
                        </h4>
                        <p className="text-[10px] text-slate-600 leading-relaxed font-medium">
                          Jika Anda mendapati error pesan <strong>"Anda tidak memiliki izin untuk memanggil DriveApp"</strong>, ikuti instruksi berikut untuk mengatasinya dalam 1 menit:
                        </p>
                        <ol className="list-decimal list-inside text-[10px] text-slate-600 font-semibold space-y-1">
                          <li>Buka lembar editor <strong>Google Apps Script</strong> Anda.</li>
                          <li>Di dropdown pemilihan fungsi bagian atas editor, pilih fungsi <code className="bg-white px-1.5 py-0.5 rounded border font-mono text-amber-700">authorizeDrive</code>.</li>
                          <li>Klik tombol <strong className="text-amber-800">Run (Jalankan)</strong> di sebelah kiri dropdown tersebut.</li>
                          <li>Google akan memunculkan popup otorisasi. Klik <strong>Review Permissions</strong> &gt; Pilih Akun Google Anda &gt; Klik <strong>Advanced (Lanjutan)</strong> &gt; Klik <strong>Go to ... (Unsafe)</strong> &gt; Klik <strong>Allow (Izinkan)</strong>.</li>
                          <li>Terakhir, klik kembali tombol <strong>Deploy &gt; Manage Deployments</strong>, klik ikon pensil (edit), ganti versi ke <strong>New Version</strong>, lalu klik <strong>Deploy</strong> ulang.</li>
                        </ol>
                      </div>

                      <button type="submit" className="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white shadow-md font-bold py-3 rounded-xl text-xs transition-all">
                        Simpan Konfigurasi
                      </button>
                    </form>
                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    function ReportSheet({ data, schoolConfig }) {
      const { guru, absen, jurnal, stats } = data;

      if (!guru) {
        return (
          <div className="p-8 text-center bg-white text-slate-500 border border-slate-200 rounded-2xl italic text-xs">
            Harap tentukan pendidik terlebih dahulu pada daftar.
          </div>
        );
      }

      return (
        <div className="bg-white rounded-2xl p-8 text-slate-800 shadow-xl border border-slate-200 mx-auto print-layout" style={{ width: '100%' }}>
          
          <div className="border-b-2 border-slate-800 pb-5 flex items-center justify-between">
            <div>
              <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest block leading-none mb-1">{schoolConfig.province}</span>
              <h2 className="text-lg font-black text-slate-900 leading-none">{schoolConfig.name}</h2>
              <p className="text-xs text-slate-500 mt-1">Berkas Rekapitulasi Kinerja Bulanan Guru • Semester Genap T.P {schoolConfig.year}</p>
            </div>
            <div className="w-14 h-14 bg-slate-50 rounded-xl flex items-center justify-center p-1 border border-slate-200 shrink-0">
              <img 
                src={schoolConfig.logo} 
                alt="Logo" 
                className="w-full h-full object-contain" 
                onError={(e) => {
                  e.target.onerror = null;
                  e.target.src = "https://placehold.co/100x100/0284c7/ffffff?text=SMK+CB";
                }}
              />
            </div>
          </div>

          <div className="my-6 grid grid-cols-2 gap-4 text-xs">
            <div>
              <p className="text-[9px] text-slate-400 uppercase font-black tracking-wide leading-none">Nama Lengkap Pendidik</p>
              <p className="font-extrabold text-slate-800 mt-1 text-sm">{guru.nama}</p>
              
              <p className="text-[9px] text-slate-400 uppercase font-black tracking-wide leading-none mt-3.5">NIP Pegawai</p>
              <p className="font-mono font-bold text-slate-700 mt-1">{guru.nip}</p>
            </div>
            <div className="text-right">
              <p className="text-[9px] text-slate-400 uppercase font-black tracking-wide leading-none">Mata Pelajaran Diajarkan</p>
              <p className="font-bold text-slate-700 mt-1">{guru.mapel}</p>
              
              <p className="text-[9px] text-slate-400 uppercase font-black tracking-wide leading-none mt-3.5">Tanggal Penerbitan</p>
              <p className="font-bold text-slate-700 mt-1">{new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
            </div>
          </div>

          <div className="grid grid-cols-4 gap-2 py-4 bg-slate-50 rounded-xl border border-slate-100 text-center mb-6">
            <div>
              <span className="text-[8px] font-bold text-slate-400 uppercase block">Target KBM</span>
              <span className="text-sm font-black text-slate-800 block mt-0.5">{stats.target} Hari</span>
            </div>
            <div>
              <span className="text-[8px] font-bold text-slate-400 uppercase block">Kehadiran Aktual</span>
              <span className="text-sm font-black text-slate-800 block mt-0.5">{stats.hadir} Hari</span>
            </div>
            <div>
              <span className="text-[8px] font-bold text-slate-400 uppercase block">Jam Pembelajaran</span>
              <span className="text-sm font-black text-sky-700 block mt-0.5">{stats.jp} JP</span>
            </div>
            <div>
              <span className="text-[8px] font-bold text-slate-400 uppercase block">Rasio Efektif</span>
              <span className="text-sm font-black text-emerald-600 block mt-0.5">{stats.percent}%</span>
            </div>
          </div>

          <div className="space-y-2 mt-6">
            <h3 className="text-xs font-black uppercase tracking-wider text-slate-900 border-b border-slate-200 pb-1">
              I. Log Kehadiran Absensi Geofence
            </h3>
            <table className="w-full text-left text-xs border-collapse">
              <thead>
                <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                  <th className="py-2 px-3 font-extrabold">Tanggal</th>
                  <th className="py-2 px-3 font-extrabold">Waktu</th>
                  <th className="py-2 px-3 font-extrabold">Aktivitas</th>
                  <th className="py-2 px-3 font-extrabold">Jarak GPS</th>
                  <th className="py-2 px-3 font-extrabold text-right">Hasil Verifikasi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {absen.length === 0 ? (
                  <tr><td colSpan="5" className="py-4 text-center text-slate-400 italic">Belum tercatat adanya kehadiran absensi.</td></tr>
                ) : (
                  absen.map((item, i) => (
                    <tr key={i} className="hover:bg-slate-50/50">
                      <td className="py-2 px-3 font-mono text-slate-600">{item.tanggal}</td>
                      <td className="py-2 px-3 font-mono text-slate-600">{item.waktu}</td>
                      <td className="py-2 px-3 font-bold text-slate-800">Absen {item.jenis}</td>
                      <td className="py-2 px-3 text-slate-500">{item.lokasi}</td>
                      <td className={`py-2 px-3 text-right font-bold ${item.status === 'Terlambat' ? 'text-rose-600' : 'text-emerald-600'}`}>{item.status}</td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          <div className="space-y-2 mt-8">
            <h3 className="text-xs font-black uppercase tracking-wider text-slate-900 border-b border-slate-200 pb-1">
              II. Laporan Jurnal Proses Pembelajaran KBM
            </h3>
            <table className="w-full text-left text-xs border-collapse">
              <thead>
                <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                  <th className="py-2 px-3 font-extrabold w-24">Tanggal</th>
                  <th className="py-2 px-3 font-extrabold w-20">Kelas</th>
                  <th className="py-2 px-3 font-extrabold">Pokok Pembahasan</th>
                  <th className="py-2 px-3 font-extrabold w-16 text-center">Durasi</th>
                  <th className="py-2 px-3 font-extrabold text-right w-24">Ketercapaian</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {jurnal.length === 0 ? (
                  <tr><td colSpan="5" className="py-4 text-center text-slate-400 italic">Belum tercatat adanya pengisian jurnal kelas.</td></tr>
                ) : (
                  jurnal.map((item, i) => (
                    <tr key={i} className="hover:bg-slate-50/50">
                      <td className="py-2 px-3 font-mono text-slate-500">{item.tanggal}</td>
                      <td className="py-2 px-3 font-bold text-slate-800">{item.kelas}</td>
                      <td className="py-2 px-3">
                        <span className="font-semibold text-slate-800 block">{item.materi}</span>
                        {item.catatan && <span className="text-[10px] text-slate-400 italic block mt-0.5">{item.catatan}</span>}
                      </td>
                      <td className="py-2 px-3 text-center font-mono font-bold text-slate-700">{item.durasi} JP</td>
                      <td className="py-2 px-3 text-right font-bold text-emerald-600">{item.indikator}</td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          <div className="mt-14 grid grid-cols-2 gap-4 text-xs text-center">
            <div>
              <p className="text-slate-500">Guru Pengampu,</p>
              <div className="h-16 flex items-center justify-center">
                <span className="font-serif italic text-slate-300 select-none">Tanda Tangan Digital</span>
              </div>
              <p className="font-extrabold text-slate-800 underline underline-offset-4">{guru.nama}</p>
              <p className="text-slate-500 mt-1 font-mono">NIP. {guru.nip}</p>
            </div>
            <div>
              <p className="text-slate-500">Mengetahui, Kepala Sekolah</p>
              <div className="h-16 flex items-center justify-center relative">
                <div className="absolute opacity-10 border-2 border-dashed border-blue-600 rounded-full w-14 h-14 flex items-center justify-center rotate-12">
                  <span className="text-[6px] font-black text-blue-600 text-center leading-none">SMK CANDA BHIRAWA</span>
                </div>
                <span className="font-serif italic text-slate-300 select-none">Sah Verifikasi Sistem</span>
              </div>
              <p className="font-extrabold text-slate-800 underline underline-offset-4 font-bold">SUPRIYADI, S.Pd.</p>
              <p className="text-slate-500 mt-1 font-mono">NIP. -</p>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
